name: tikwiki
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  path_provider: ^2.1.5

  # Local Monorepo Packages
  wikipedia_api:
    path: ./packages/wikipedia_api
  tikwiki_algo:
    path: ./packages/tikwiki_algo

  # Third-Party Backend Ecosystem
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1

  # Architecture Dependencies
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  riverpod_annotation: ^4.0.2
  dio: ^5.9.2
  equatable: ^2.0.8
  json_annotation: ^4.9.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.0
  injectable_generator: ^2.6.0
  json_serializable: ^6.9.5
  riverpod_generator: ^4.0.0

flutter:
  uses-material-design: true
